<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Sistema Clínica</title>
    <link rel="stylesheet" href="../css/dashboard.css?v=6.0">
</head>
<body>
    <div class="dashboard-container">
        <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>CLÍNICA</h2>
                <p>Panel Administrativo</p>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="../pags/home.html" class="nav-link">HOME</a></li>
                    <li class="nav-item"><a href="../pags/mantenimiento.html" class="nav-link">MANTENIMIENTO</a></li>
                    <li class="nav-item"><a href="../pags/consulta.html" class="nav-link">CONSULTA</a></li>
                    <li class="nav-item"><a href="../pags/procesos.html" class="nav-link">PROCESOS</a></li>
                    <li class="nav-item"><a href="../pags/reportes.html" class="nav-link active">REPORTES</a></li>
                </ul>
                <ul class="nav-menu" style="position: absolute; bottom: 30px; width: calc(100% - 40px);">
                    <li class="nav-item"><a href="../Index.html" class="nav-link" style="color: #4ade80 !important; font-weight: 700;">VER PÁGINA WEB</a></li>
                    <li class="nav-item"><a href="../php/logout.php" class="nav-link" style="color: #ff4d4d !important; font-weight: 700;">CERRAR SESIÓN</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1>Reportes Generales</h1>
            </header>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="showTab('pacientes')">Pacientes</button>
                <button class="tab-btn" onclick="showTab('citas')">Citas</button>
                <button class="tab-btn" onclick="showTab('ingresos')">Ingresos</button>
                <button class="tab-btn" onclick="showTab('doctores')">Doctores</button>
            </div>

            <div id="statsContainer" class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;"></div>

            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: var(--accent-cyan);">Datos Detallados</h2>
                    <button class="btn-primary" onclick="window.print()">Exportar PDF</button>
                </div>
                <table class="data-table">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let currentType = 'pacientes';
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function showTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            currentType = type;
            fetchReport();
        }
        function fetchReport() {
            const statsCont = document.getElementById('statsContainer');
            const tableH = document.getElementById('tableHeader');
            const tableB = document.getElementById('tableBody');
            tableB.innerHTML = '<tr><td colspan="10" style="text-align:center;">Cargando...</td></tr>';
            fetch(`../php/api/get_reportes.php?type=${currentType}`)
                .then(r => r.json()).then(res => {
                    if(res.success) {
                        const data = res.data;
                        statsCont.innerHTML = '';
                        if(data.stats) {
                            for(let key in data.stats) {
                                statsCont.innerHTML += `<div class="stat-card" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);"><h3 style="color: var(--accent-cyan); font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase;">${key}</h3><div style="font-size: 1.5rem; font-weight: 700;">${data.stats[key]}</div></div>`;
                            }
                        }
                        tableB.innerHTML = '';
                        if(currentType === 'pacientes') {
                            tableH.innerHTML = '<tr><th>Mes</th><th>Atendidos</th><th>Retención</th></tr>';
                            data.table.forEach(i => { tableB.innerHTML += `<tr><td>${i.Mes}</td><td>${i.Atendidos}</td><td>${i.Retencion}</td></tr>`; });
                        } else if(currentType === 'citas') {
                            tableH.innerHTML = '<tr><th>Especialidad</th><th>Total</th><th>Atendidas</th><th>Canceladas</th></tr>';
                            data.table.forEach(i => { tableB.innerHTML += `<tr><td>${i.Especialidad}</td><td>${i.TotalCitas}</td><td>${i.Atendidas}</td><td>${i.Canceladas}</td></tr>`; });
                        } else if(currentType === 'ingresos') {
                            tableH.innerHTML = '<tr><th>Concepto</th><th>Cantidad</th><th>Total</th></tr>';
                            data.table.forEach(i => { tableB.innerHTML += `<tr><td>${i.Concepto}</td><td>${i.Cantidad}</td><td>$${i.Total}</td></tr>`; });
                        } else if(currentType === 'doctores') {
                            tableH.innerHTML = '<tr><th>Doctor</th><th>Especialidad</th><th>Pacientes</th><th>Ingresos</th></tr>';
                            data.table.forEach(i => { tableB.innerHTML += `<tr><td>${i.Doctor}</td><td>${i.Especialidad}</td><td>${i.PacientesAtendidos}</td><td>$${parseFloat(i.IngresosGenerados || 0).toFixed(2)}</td></tr>`; });
                        }
                    }
                });
        }
        document.addEventListener('DOMContentLoaded', fetchReport);
    </script>
</body>
</html>
